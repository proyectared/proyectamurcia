<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecta - Conectando Talento Emprendedor en Murcia</title>
    <!-- Cargamos Tailwind CSS para el diseño visual moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <!-- CABECERA -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="text-2xl font-black tracking-tight text-indigo-600">📋 Proyecta</span>
                <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full border border-indigo-100">Región de Murcia</span>
            </div>
            <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm px-4 py-2 rounded-lg transition-colors">
                Publicar Proyecto
            </button>
        </div>
    </header>

    <!-- CUERPO PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- INTRODUCCIÓN -->
        <div class="text-center max-w-2xl mx-auto mb-12">
            <h1 class="text-4xl font-extrabold tracking-tight text-slate-900 sm:text-5xl mb-4">
                Encuentra a tu socio ideal en el ecosistema universitario
            </h1>
            <p class="text-lg text-slate-600">
                Conectamos ideas de negocio (ADE, Marketing) con talento técnico (Ingeniería, Informática) de la UMU, UCAM y UPCT.
            </p>
        </div>

        <!-- FILTROS (Universidad) -->
        <div class="flex flex-wrap gap-2 justify-center mb-10">
            <button class="bg-indigo-600 text-white px-4 py-2 rounded-full text-sm font-medium shadow-sm">Todas las universidades</button>
            <button class="bg-white hover:bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-sm font-medium border border-slate-200">UMU</button>
            <button class="bg-white hover:bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-sm font-medium border border-slate-200">UCAM</button>
            <button class="bg-white hover:bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-sm font-medium border border-slate-200">UPCT</button>
        </div>

        <!-- TABLÓN DE ANUNCIOS -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <!-- Datos de reserva por si Supabase tarda en responder -->
            <div id="cargando-proyectos" class="col-span-full text-center text-slate-500 py-12">
                Cargando el tablón de proyectos...
            </div>

        </div>
    </main>

    <!-- Conector de Supabase y Lógica del Tablón -->
   <!-- Conector directo sin restricciones de librería -->
    <script>
        async function cargarProyectos() {
            const contenedor = document.querySelector('main .grid');
            const url = "https://kbxrzjuctrhmzuuvpau.supabase.co/rest/v1/proyectos?select=*&order=creado_el.desc";
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'apikey': "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieHJ6anVjdHJobXp1dXZ2cGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDIwMDIsImV4cCI6MjEwMDAxODAwMn0.ML-uca24cpvIWaj5n88tVjrhf0thEaN_jNGfh4rfuvI",
                        'Authorization': "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieHJ6anVjdHJobXp1dXZ2cGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ0NDIwMDIsImV4cCI6MjEwMDAxODAwMn0.ML-uca24cpvIWaj5n88tVjrhf0thEaN_jNGfh4rfuvI"
                    }
                });

                if (!response.ok) throw new Error("Fallo en la respuesta del servidor");
                const proyectos = await response.json();

                if (proyectos && proyectos.length > 0) {
                    contenedor.innerHTML = ''; 
                    
                    proyectos.forEach(proy => {
                        // Limpiamos el formato por si viene como texto plano o array
                        let socios = proy.socio_buscado;
                        if (typeof socios === 'string') {
                            socios = socios.replace(/[{""}]/g, '').split(',');
                        }
                        
                        const etiquetas = socios.map(socio => 
                            `<span class="bg-indigo-50 text-indigo-700 text-xs font-medium px-2 py-1 rounded">${socio.trim()}</span>`
                        ).join('');

                        const tarjeta = `
                            <div class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm hover:shadow-md transition-shadow flex flex-col justify-between">
                                <div>
                                    <div class="flex justify-between items-start mb-3">
                                        <span class="text-xs font-bold tracking-wide uppercase bg-indigo-50 text-indigo-800 border border-indigo-200 px-2.5 py-0.5 rounded">${proy.etapa}</span>
                                        <span class="text-xs font-medium text-slate-500">📍 Región de Murcia</span>
                                    </div>
                                    <h3 class="text-xl font-bold text-slate-900 mb-2">${proy.nombre_proyecto}</h3>
                                    <p class="text-slate-600 text-sm mb-4 line-clamp-2">${proy.descripcion_corta}</p>
                                </div>
                                <div>
                                    <div class="mb-4">
                                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Busca socio:</p>
                                        <div class="flex flex-wrap gap-1">${etiquetas}</div>
                                    </div>
                                    <a href="mailto:${proy.email_contacto}" class="block text-center bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2.5 rounded-lg transition-colors">
                                        Conectar por Email
                                    </a>
                                </div>
                            </div>
                        `;
                        contenedor.innerHTML += tarjeta;
                    });
                } else {
                    contenedor.innerHTML = '<div class="col-span-full text-center text-slate-500 py-12">Aún no hay proyectos publicados. ¡Sé el primero!</div>';
                }
            } catch (err) {
                contenedor.innerHTML = `
                    <div class="col-span-full bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl text-center">
                        <p class="font-bold">⚠️ Error al conectar con Supabase:</p>
                        <p class="text-xs font-mono mt-1">${err.message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener('DOMContentLoaded', cargarProyectos);
    </script>
</body>
</html>
